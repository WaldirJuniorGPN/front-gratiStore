<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/js/auth/auth-guard.js"></script>
    <script src="/js/auth/role-guard.js"></script>
    <script src="/js/auth/permissao-catalogo.js"></script>
    <script src="/js/auth/permissao-guard.js"></script>
    <title>Histórico de Importações · GratiStore</title>
    <link rel="stylesheet" href="/css/cadastro-shared.css">
    <link rel="stylesheet" href="/css/banner-senha-padrao.css">
    <!-- header.css no head estatico (render-blocking) evita o FOUC da sidebar; header.html mantem o link como fallback -->
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/expiracao-sessao.css">
    <link rel="stylesheet" href="/css/toast.css">
    <link rel="stylesheet" href="/css/importacao-comum.css">
    <link rel="stylesheet" href="/css/importacoes-historico.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>
    <main>
        <header class="page-header">
            <div>
                <h1>Histórico de Importações</h1>
                <p class="page-subtitle">Todas as planilhas processadas, ordenadas da mais recente para a mais antiga.</p>
            </div>
            <div class="page-actions">
                <a class="btn btn-primary" href="/html/importacao-pontos.html">
                    <span class="btn-icon" aria-hidden="true">⇪</span> Nova importação
                </a>
            </div>
        </header>

        <section class="panel">
            <header class="panel-header">
                <div>
                    <h2 id="tituloPanel">Importações recentes</h2>
                    <p class="panel-subtitle"><span id="contagemTotal">—</span> importação(ões) no total.</p>
                </div>
            </header>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="col-id">#</th>
                            <th>Arquivo</th>
                            <th>Loja</th>
                            <th class="col-periodo">Período</th>
                            <th>Status</th>
                            <th class="th-num col-pontos-ok">Pontos OK</th>
                            <th class="th-num">Pendências</th>
                            <th class="th-acao" aria-label="Ações"></th>
                        </tr>
                    </thead>
                    <tbody id="corpo">
                        <tr class="row-loading"><td colspan="8">Carregando histórico…</td></tr>
                    </tbody>
                </table>
            </div>
            <footer class="panel-footer paginacao" id="paginacao" hidden>
                <span class="paginacao__info" id="paginacaoInfo">—</span>
                <div class="paginacao__controles">
                    <button type="button" class="paginacao__btn" id="paginaAnterior" aria-label="Página anterior">←</button>
                    <span>Página <span class="paginacao__atual" id="paginaAtual">1</span> de <span class="paginacao__atual" id="paginaTotal">1</span></span>
                    <button type="button" class="paginacao__btn" id="paginaProxima" aria-label="Próxima página">→</button>
                </div>
            </footer>
        </section>
    </main>

    <script src="/js/api/config.js"></script>
    <script src="/js/api/erros.js"></script>
    <script src="/js/api/sessao.js"></script>
    <script src="/js/api/apiClient.js"></script>
    <script src="/js/api/importacao-pontos.js"></script>
    <script src="/js/ui/toast.js"></script>
    <script src="/js/ui/importacao-ui.js"></script>
    <script src="/js/importacoes-historico.js"></script>
    <script src="/js/ui/banner-senha-padrao.js"></script>
    <script src="/js/ui/expiracao-sessao.js"></script>
    <script src="/js/header.js"></script>
</body>
</html>
