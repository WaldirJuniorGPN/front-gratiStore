<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar — GratiStore</title>
    <link rel="stylesheet" href="/css/cadastro-shared.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <main class="login-container">
        <section class="login-card" aria-labelledby="loginTitulo">
            <header class="login-header">
                <h1 id="loginTitulo">GratiStore</h1>
                <p class="login-subtitle">Acesse o painel administrativo</p>
            </header>

            <div id="mensagem" class="mensagem" role="alert" aria-live="polite" hidden></div>

            <form id="formLogin" class="login-form" novalidate>
                <div class="form-row">
                    <label for="email">E-mail <span class="required">*</span></label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        autocomplete="username"
                        placeholder="seu.email@gratistore.local"
                        autofocus
                    >
                </div>

                <div class="form-row">
                    <label for="senha">Senha <span class="required">*</span></label>
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        required
                        autocomplete="current-password"
                        placeholder="Sua senha"
                    >
                </div>

                <button type="submit" id="btnEntrar" class="btn btn-primary login-submit">
                    Entrar
                </button>
            </form>
        </section>
    </main>

    <script src="/js/api/config.js"></script>
    <script src="/js/api/erros.js"></script>
    <script src="/js/api/sessao.js"></script>
    <script src="/js/api/apiClient.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
