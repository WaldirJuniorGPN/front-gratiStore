<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ponto - GratiStore</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/registro-ponto.css">
</head>
<body>
    <div id="header-container"></div>
    
    <main>
        <h1>Registro de Ponto</h1>
        
        <div class="store-selection">
            <label for="store-select">Selecione a loja:</label>
            <select id="store-select">
                <option value="">Selecione uma loja</option>
            </select>
        </div>

        <div class="employee-selection">
            <label for="employee-select">Selecione o atendente:</label>
            <select id="employee-select">
                <option value="">Selecione um atendente</option>
            </select>
        </div>
        
        <div class="period-selector">
            <label for="month-year">Selecione o Período:</label>
            <input type="month" id="month-year" name="month-year">
        </div>

        <div class="time-table">
            <table id="ponto-table">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Dia da Semana</th>
                        <th>Entrada</th>
                        <th>Início Almoço</th>
                        <th>Fim Almoço</th>
                        <th>Saída</th>
                    </tr>
                </thead>
                <tbody id="ponto-tbody">
                    <!-- Preenchido via JavaScript -->
                </tbody>
            </table>
        </div>

        <div class="bulk-actions">
            <button id="bulk-register" class="bulk-register">Registrar Todos</button>
        </div>
    </main>

    <script src="/js/header.js"></script>
    <script src="/js/registro-ponto.js"></script>
</body>
</html>
