<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/js/auth/auth-guard.js"></script>
    <script src="/js/auth/role-guard.js"></script>
    <title>Novo Usuário — GratiStore</title>
    <link rel="stylesheet" href="/css/cadastro-shared.css">
    <link rel="stylesheet" href="/css/banner-senha-padrao.css">
    <!-- header.css no head estatico (render-blocking) evita o FOUC da sidebar; header.html mantem o link como fallback -->
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/expiracao-sessao.css">
    <link rel="stylesheet" href="/css/cadastro-usuario.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>
    <main>
        <header class="page-header">
            <div>
                <h1>Novo Usuário</h1>
                <p class="page-subtitle">Cadastre um novo usuário com acesso ao painel administrativo.</p>
            </div>
        </header>

        <div id="mensagem" class="mensagem" role="alert" aria-live="polite" hidden></div>

        <section class="panel usuario-card">
            <form id="formUsuario" class="usuario-form" novalidate autocomplete="off">
                <div class="form-row">
                    <label for="nome">Nome completo <span class="required">*</span></label>
                    <input
                        type="text"
                        id="nome"
                        name="nome"
                        required
                        autocomplete="off"
                        placeholder="Ex.: Maria Operadora"
                        autofocus
                    >
                </div>

                <div class="form-row">
                    <label for="email">E-mail <span class="required">*</span></label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        autocomplete="off"
                        placeholder="usuario@gratistore.local"
                    >
                </div>

                <div class="form-row">
                    <label for="senha">Senha <span class="required">*</span></label>
                    <div class="senha-wrapper">
                        <input
                            type="password"
                            id="senha"
                            name="senha"
                            required
                            minlength="8"
                            autocomplete="new-password"
                            placeholder="Mínimo de 8 caracteres"
                        >
                        <button
                            type="button"
                            class="senha-toggle"
                            id="btnToggleSenha"
                            aria-label="Mostrar senha"
                            aria-pressed="false"
                        >Mostrar</button>
                    </div>
                    <p class="form-hint">A senha deve ter no mínimo 8 caracteres.</p>
                </div>

                <div class="form-row">
                    <label for="role">Papel <span class="required">*</span></label>
                    <select id="role" name="role" required>
                        <option value="">Selecione o papel...</option>
                        <option value="MASTER">MASTER (administrador total)</option>
                        <option value="COMUM">COMUM (consulta / operação)</option>
                    </select>
                    <p class="form-hint"><strong>MASTER</strong> pode gerenciar usuários e toda a plataforma. <strong>COMUM</strong> tem acesso apenas a consultas e operações do dia a dia.</p>
                </div>

                <div class="form-error" id="erroFormulario" hidden></div>

                <div class="usuario-actions">
                    <a href="/html/usuarios.html" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" id="btnCadastrar" class="btn btn-primary usuario-submit">Cadastrar usuário</button>
                </div>
            </form>
        </section>
    </main>

    <script src="/js/api/config.js"></script>
    <script src="/js/api/erros.js"></script>
    <script src="/js/api/sessao.js"></script>
    <script src="/js/api/apiClient.js"></script>
    <script src="/js/cadastro-usuario.js"></script>
    <script src="/js/ui/banner-senha-padrao.js"></script>
    <script src="/js/ui/expiracao-sessao.js"></script>
    <script src="/js/header.js"></script>
</body>
</html>
