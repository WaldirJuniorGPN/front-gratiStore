<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/js/auth/auth-guard.js"></script>
    <script src="/js/auth/role-guard.js"></script>
    <script src="/js/auth/permissao-catalogo.js"></script>
    <script src="/js/auth/permissao-guard.js"></script>
    <title>Atualizar Funcionário</title>
    <link rel="stylesheet" href="/css/atualizar-funcionario.css">
    <link rel="stylesheet" href="/css/banner-senha-padrao.css">
    <link rel="stylesheet" href="/css/expiracao-sessao.css">
    <link rel="stylesheet" href="/css/toast.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>
    <h1>Atualizar Funcionário</h1>
    <form id="formAtualizarAtendente">
        <label for="nome">Nome do Funcionário:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="loja">Loja:</label>
        <select id="loja" name="loja" required>
            <option value="">Selecione uma loja</option>
            <!-- Opções de lojas serão adicionadas dinamicamente -->
        </select>

        <label for="salario">Salário:</label>
        <div class="input-group">
            <span class="input-prefix">R$</span>
            <input type="text" id="salario" name="salario" required placeholder="2.000,00">
        </div>

        <label for="dataAdmissao">Data de Admissão:</label>
        <input type="date" id="dataAdmissao" name="dataAdmissao" required>
        <small class="campo-ajuda">Alterar esta data afeta o cálculo dos períodos aquisitivos de férias.</small>

        <label for="idRelogioPonto">ID do relógio de ponto (opcional):</label>
        <input type="number" id="idRelogioPonto" name="idRelogioPonto" min="1" step="1" inputmode="numeric" placeholder="Ex.: 42" autocomplete="off">
        <small class="campo-ajuda">Número do colaborador no relógio biométrico. Preencher torna a importação de pontos 100% precisa para este atendente.</small>

        <button type="submit">Salvar Alterações</button>
    </form>
    <div id="mensagem"></div>

    <script src="/js/api/config.js"></script>
    <script src="/js/api/erros.js"></script>
    <script src="/js/api/sessao.js"></script>
    <script src="/js/api/apiClient.js"></script>
    <script src="/js/api/importacao-pontos.js"></script>
    <script src="/js/ui/toast.js"></script>
    <script src="/js/atualizar-funcionario.js"></script>
    <script src="/js/ui/banner-senha-padrao.js"></script>
    <script src="/js/ui/expiracao-sessao.js"></script>
    <script src="/js/header.js"></script>
</body>
</html>
